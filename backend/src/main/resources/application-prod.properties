# ── TiDB Serverless 직접 연결 (SSH 터널 불필요) ──────────────────────
spring.datasource.url=jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/processmanager?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=2Wzn7DhAZLpe7d1.root
spring.datasource.password=${DB_PASSWORD}

# 컨테이너 환경에서 외부 트래픽을 받으려면 모든 인터페이스에 바인딩 필요
server.address=0.0.0.0
server.error.include-message=never
server.error.include-stacktrace=never

# Google OAuth2 redirect URI. Render sets RENDER_EXTERNAL_URL at runtime.
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH2_LOGIN_REDIRECT_URI:${RENDER_EXTERNAL_URL:https://processmanager-web.onrender.com}/login/oauth2/code/google}
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:${RENDER_EXTERNAL_URL:https://processmanager-web.onrender.com}/oauth2/redirect}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${RENDER_EXTERNAL_URL:https://processmanager-web.onrender.com}}
app.public-url=${APP_PUBLIC_URL:${RENDER_EXTERNAL_URL:https://processmanager-web.onrender.com}}

# Set APP_REFRESH_TOKEN_STORE=redis and REDIS_URL when Redis is provisioned.
app.refresh-token.store=${APP_REFRESH_TOKEN_STORE:database}
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
