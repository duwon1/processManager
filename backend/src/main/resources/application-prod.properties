# ── TiDB Serverless 직접 연결 (SSH 터널 불필요) ──────────────────────
spring.datasource.url=jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/processmanager?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=2Wzn7DhAZLpe7d1.root
spring.datasource.password=${DB_PASSWORD}

# Fly.io에서 외부 트래픽을 받으려면 모든 인터페이스에 바인딩 필요
server.address=0.0.0.0
server.error.include-message=never
server.error.include-stacktrace=never

# Google OAuth2 redirect URI 고정 (Fly.io 리버스 프록시 환경에서 https로 명시)
spring.security.oauth2.client.registration.google.redirect-uri=https://procmanager.fly.dev/login/oauth2/code/google
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:https://procmanager.fly.dev/oauth2/redirect}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://procmanager.fly.dev}
app.public-url=${APP_PUBLIC_URL:https://procmanager.fly.dev}

# Set APP_REFRESH_TOKEN_STORE=redis and REDIS_URL when Redis is provisioned.
app.refresh-token.store=${APP_REFRESH_TOKEN_STORE:database}
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
