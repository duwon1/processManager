spring.application.name=processManager

# 서버 포트 설정 (기본 포트 8080)
server.port=8080

# MySQL 설정
spring.datasource.url=jdbc:mysql://localhost:13306/processmanager?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# SSH 터널링 설정
ssh.host=${SSH_HOST}
ssh.port=${SSH_PORT}
ssh.username=${SSH_USERNAME}
ssh.password=${SSH_PASSWORD}
ssh.remote-db-host=${SSH_REMOTE_DB_HOST}
ssh.remote-db-port=${SSH_REMOTE_DB_PORT}
ssh.local-port=13306

# MyBatis 설정
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 테이블 자동 생성
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# 파일 인코딩 설정
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# JWT 시크릿 키
jwt.secret=${JWT_SECRET}

# CORS 허용 출처 (쉼표로 여러 개 구분 가능)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# SSH StrictHostKeyChecking (개발: no, 운영: yes)
ssh.strict-host-key-checking=${SSH_STRICT_HOST_KEY_CHECKING:no}

# OAuth2 리다이렉트 URI (프론트엔드 URL)
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}

# Access Token 만료시간 (30분 = 1800000 밀리초)
jwt.access-expiration=1800000

# ==========================================
# Google OAuth2 (구글 소셜 로그인) 설정
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
