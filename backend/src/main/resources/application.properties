spring.application.name=processManager

# 서버 포트 설정 (기본 포트 8080)
server.port=8080

# H2 Database 설정 (메모리 기반 테스트용 DB)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 파일 인코딩 설정
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# JWT 시크릿 키
jwt.secret=processManagerSecretKeyForJwtTokenGenerationSecurity12345!@#

# Access Token 만료시간 (30분 = 1800000 밀리초)
jwt.access-expiration=1800000

# Refresh Token 만료시간 (7일 = 604800000 밀리초)
jwt.refresh-expiration=604800000

