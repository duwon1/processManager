# 테스트 ApplicationContext는 외부 Google/운영 DB에 의존하지 않도록 격리합니다.
spring.datasource.url=jdbc:h2:mem:processmanager;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 보안/OAuth 자동설정이 placeholder 없이 로딩되도록 테스트 전용 더미 값을 둡니다.
jwt.secret=test-secret-key-for-application-context-loading-only
jwt.access-expiration=1800000
app.cors.allowed-origins=http://localhost:5173
GOOGLE_CLIENT_ID=test-client-id
GOOGLE_CLIENT_SECRET=test-client-secret
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
app.refresh-token.store=database
