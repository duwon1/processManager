name: Deploy to Fly.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy procmanager
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Fly runtime secrets
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAIL_CLIENT_ID: ${{ secrets.GOOGLE_MAIL_CLIENT_ID }}
          GOOGLE_MAIL_CLIENT_SECRET: ${{ secrets.GOOGLE_MAIL_CLIENT_SECRET }}
          GOOGLE_MAIL_REFRESH_TOKEN: ${{ secrets.GOOGLE_MAIL_REFRESH_TOKEN }}
          GOOGLE_MAIL_FROM: ${{ secrets.GOOGLE_MAIL_FROM }}
        run: |
          set -euo pipefail

          secret_args=(
            "APP_CORS_ALLOWED_ORIGINS=https://procmanager.fly.dev"
            "APP_OAUTH2_REDIRECT_URI=https://procmanager.fly.dev/oauth2/redirect"
            "APP_PUBLIC_URL=https://procmanager.fly.dev"
          )

          core_secrets=(
            DB_PASSWORD
            JWT_SECRET
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
          )

          for name in "${core_secrets[@]}"; do
            if [ -n "${!name:-}" ]; then
              secret_args+=("${name}=${!name}")
            fi
          done

          optional_secrets=(
            GOOGLE_MAIL_CLIENT_ID
            GOOGLE_MAIL_CLIENT_SECRET
            GOOGLE_MAIL_REFRESH_TOKEN
            GOOGLE_MAIL_FROM
          )

          for name in "${optional_secrets[@]}"; do
            if [ -n "${!name:-}" ]; then
              secret_args+=("${name}=${!name}")
            fi
          done

          flyctl secrets set --stage --app procmanager "${secret_args[@]}"

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
